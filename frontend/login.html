<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Performance Analyzer — Login</title>
    <meta name="description" content="Login to CDN Performance Analyzer — Network Intelligence & Performance Research Tool">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:         #06080f;
            --bg-card:    rgba(12, 16, 28, 0.75);
            --border:     rgba(100, 140, 255, 0.08);
            --border-glow: rgba(0, 212, 255, 0.2);
            --text:       #e2e8f0;
            --text-dim:   #6b7a8d;
            --text-bright:#ffffff;
            --accent:     #00d4ff;
            --accent2:    #7b2fff;
            --accent3:    #ff3cac;
            --green:      #00e676;
            --red:        #ff5252;
            --grad:       linear-gradient(135deg, #00d4ff, #7b2fff);
            --radius:     16px;
            --radius-sm:  10px;
            --font:       'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono:       'JetBrains Mono', monospace;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { font-size: 15px; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ─── Animated Background ─── */
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(100,140,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,140,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0; pointer-events: none;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
            animation: orbFloat 18s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; background: #00d4ff; top: -180px; left: -120px; opacity: 0.3; }
        .orb-2 { width: 450px; height: 450px; background: #7b2fff; bottom: -200px; right: -150px; opacity: 0.25; animation-delay: -6s; }
        .orb-3 { width: 300px; height: 300px; background: #ff3cac; top: 40%; right: 10%; opacity: 0.12; animation-delay: -12s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -40px) scale(1.08); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
        }

        /* ─── Main Container ─── */
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        /* ─── Logo ─── */
        .logo-section {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 64px; height: 64px;
            margin: 0 auto 16px;
            animation: spin-slow 30s linear infinite;
        }
        @keyframes spin-slow { to { transform: rotate(360deg); } }

        .logo-title {
            font-size: 1.6rem;
            font-weight: 900;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .logo-sub {
            font-size: 0.72rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        /* ─── Card ─── */
        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px 36px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.5), 0 0 60px rgba(0,212,255,0.04);
            transition: border-color var(--transition);
        }
        .auth-card:hover {
            border-color: var(--border-glow);
        }

        /* ─── Tab Switcher ─── */
        .tab-bar {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 32px;
            position: relative;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            z-index: 2;
        }
        .tab-btn.active {
            color: var(--text-bright);
        }
        .tab-slider {
            position: absolute;
            top: 4px; bottom: 4px;
            width: calc(50% - 4px);
            background: var(--grad);
            border-radius: 8px;
            transition: transform var(--transition);
            z-index: 1;
            opacity: 0.9;
        }
        .tab-slider.right {
            transform: translateX(calc(100% + 4px));
        }

        /* ─── Forms ─── */
        .form-panel { display: none; }
        .form-panel.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-family: var(--font);
            font-size: 0.92rem;
            color: var(--text-bright);
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            outline: none;
            transition: all var(--transition);
        }
        .form-input::placeholder { color: rgba(255,255,255,0.15); }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1), 0 0 20px rgba(0,212,255,0.05);
        }

        .form-input-icon {
            position: absolute;
            right: 14px;
            top: 38px;
            color: var(--text-dim);
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 38px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px;
            transition: color var(--transition);
        }
        .password-toggle:hover { color: var(--accent); }

        /* ─── Submit Button ─── */
        .btn-submit {
            width: 100%;
            padding: 15px;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            background: var(--grad);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 20px rgba(0,212,255,0.25);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-submit:hover {
            box-shadow: 0 8px 32px rgba(0,212,255,0.4);
            transform: translateY(-2px);
        }
        .btn-submit:active { transform: translateY(0) scale(0.98); }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit .btn-loader {
            display: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .btn-loader { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Message ─── */
        .msg {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .msg.show { display: block; }
        .msg-error {
            background: rgba(255,82,82,0.1);
            border: 1px solid rgba(255,82,82,0.25);
            color: var(--red);
        }
        .msg-success {
            background: rgba(0,230,118,0.1);
            border: 1px solid rgba(0,230,118,0.25);
            color: var(--green);
        }

        /* ─── Divider ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-dim);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── Features ─── */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 28px;
        }
        .feature {
            text-align: center;
            padding: 14px 8px;
            border-radius: var(--radius-sm);
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .feature:hover {
            border-color: var(--border-glow);
            background: rgba(0,212,255,0.03);
        }
        .feature-icon {
            font-size: 1.3rem;
            margin-bottom: 6px;
        }
        .feature-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* ─── Footer ─── */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.72rem;
            color: var(--text-dim);
        }
        .auth-footer span { opacity: 0.5; }

        /* ─── Responsive ─── */
        @media (max-width: 500px) {
            .auth-card { padding: 28px 20px 24px; }
            .features { grid-template-columns: 1fr; }
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="auth-container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <svg viewBox="0 0 64 64" fill="none">
                    <circle cx="32" cy="32" r="28" stroke="url(#g1)" stroke-width="2.5"/>
                    <circle cx="32" cy="32" r="16" stroke="url(#g1)" stroke-width="2" stroke-dasharray="5 4"/>
                    <circle cx="32" cy="32" r="6" fill="url(#g1)"/>
                    <path d="M32 4v10M32 50v10M4 32h10M50 32h10" stroke="url(#g1)" stroke-width="1.5"/>
                    <defs><linearGradient id="g1" x1="0" y1="0" x2="64" y2="64">
                        <stop offset="0%" stop-color="#00d4ff"/>
                        <stop offset="100%" stop-color="#7b2fff"/>
                    </linearGradient></defs>
                </svg>
            </div>
            <h1 class="logo-title">CDN Performance Analyzer</h1>
            <p class="logo-sub">Network Intelligence & Performance Research Tool</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Tab Switcher -->
            <div class="tab-bar">
                <div class="tab-slider" id="tab-slider"></div>
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- Message -->
            <div class="msg" id="msg"></div>

            <!-- Login Form -->
            <div class="form-panel active" id="panel-login">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-login">
                        <span class="btn-text">Sign In to Dashboard</span>
                        <div class="btn-loader"></div>
                    </button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="form-panel" id="panel-register">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="reg-name" placeholder="John Doe" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="reg-email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="reg-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('reg-password', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-input" id="reg-confirm" placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-submit" id="btn-register">
                        <span class="btn-text">Create Account</span>
                        <div class="btn-loader"></div>
                    </button>
                </form>
            </div>

            <!-- Features -->
            <div class="divider">What you get</div>
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
                    </div>
                    <div class="feature-label">CDN Analysis</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7b2fff" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    </div>
                    <div class="feature-label">Load Testing</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff3cac" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                    </div>
                    <div class="feature-label">Visual Reports</div>
                </div>
            </div>
        </div>

        <div class="auth-footer">
            <span>Parul Institute &bull; Research Edition v2.0</span>
        </div>
    </div>

    <script>
        // ── Tab Switching ──
        function switchTab(tab) {
            const slider = document.getElementById('tab-slider');
            const loginBtn = document.getElementById('tab-login');
            const regBtn = document.getElementById('tab-register');
            const loginPanel = document.getElementById('panel-login');
            const regPanel = document.getElementById('panel-register');

            hideMsg();

            if (tab === 'login') {
                slider.classList.remove('right');
                loginBtn.classList.add('active');
                regBtn.classList.remove('active');
                loginPanel.classList.add('active');
                regPanel.classList.remove('active');
            } else {
                slider.classList.add('right');
                regBtn.classList.add('active');
                loginBtn.classList.remove('active');
                regPanel.classList.add('active');
                loginPanel.classList.remove('active');
            }
        }

        // ── Messages ──
        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg show msg-' + type;
        }
        function hideMsg() {
            document.getElementById('msg').className = 'msg';
        }

        // ── Password Toggle ──
        function togglePassword(inputId, btn) {
            const inp = document.getElementById(inputId);
            if (inp.type === 'password') {
                inp.type = 'text';
                btn.style.color = '#00d4ff';
            } else {
                inp.type = 'password';
                btn.style.color = '';
            }
        }

        // ── Loading state ──
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ── Register ──
        async function handleRegister(e) {
            e.preventDefault();
            hideMsg();

            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (password !== confirm) {
                showMsg('Passwords do not match', 'error');
                return;
            }

            setLoading('btn-register', true);

            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullname: name, email: email, password: password })
                });
                const data = await resp.json();

                if (!resp.ok) {
                    showMsg(data.error || 'Registration failed', 'error');
                } else {
                    showMsg('Account created! Redirecting to login...', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                }
            } catch (err) {
                showMsg('Network error. Please try again.', 'error');
            } finally {
                setLoading('btn-register', false);
            }
        }

        // ── Login ──
        async function handleLogin(e) {
            e.preventDefault();
            hideMsg();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            setLoading('btn-login', true);

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email: email, password: password })
                });
                const data = await resp.json();

                if (!resp.ok) {
                    showMsg(data.error || 'Login failed', 'error');
                } else {
                    showMsg('Welcome, ' + data.user.fullname + '!', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 800);
                }
            } catch (err) {
                showMsg('Network error. Please try again.', 'error');
            } finally {
                setLoading('btn-login', false);
            }
        }

        // ── Check if already logged in ──
        (async function() {
            try {
                const resp = await fetch('/api/auth/me', { credentials: 'include' });
                if (resp.ok) {
                    window.location.href = '/dashboard';
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
